<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#0E1014" />
<title>ゴーストトレース — ARドローイング補助</title>
<style>
  :root{
    --chrome: rgba(14,16,20,.72);
    --chrome-solid:#0E1014;
    --stroke: rgba(255,255,255,.10);
    --stroke-strong: rgba(255,255,255,.18);
    --text:#EDEFF2;
    --muted:#9AA3AE;
    --accent:#FFB020;      /* 製図ランプのような信号色 */
    --accent-press:#FFC24D;
    --danger:#FF5A5F;
    --ok:#57D9A3;
    --radius:14px;
    --tap:46px;
    --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, "Roboto Mono", monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Kaku Gothic ProN", "Noto Sans JP", system-ui, sans-serif;
  }

  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; margin:0; }
  body{
    font-family:var(--sans);
    color:var(--text);
    background:#000;
    overflow:hidden;
    overscroll-behavior:none;
    -webkit-user-select:none; user-select:none;
  }

  /* ---------- ステージ（カメラ + オーバーレイ） ---------- */
  #stage{ position:fixed; inset:0; background:#000; }

  #cam{
    position:absolute; inset:0;
    width:100%; height:100%;
    object-fit:cover;
    background:#000;
  }

  /* ジェスチャー層（指でドラッグ / ピンチ）。ロック中は無効化 */
  #gesture{ position:absolute; inset:0; touch-action:none; }
  #stage.locked #gesture{ pointer-events:none; }

  /* オーバーレイ画像のラッパー。中心基準で translate/rotate/scale */
  #overlay{
    position:absolute; left:50%; top:50%;
    transform-origin:center center;
    will-change:transform, opacity;
    pointer-events:none;            /* 実際の入力は #gesture が受ける */
    filter:drop-shadow(0 2px 14px rgba(0,0,0,.35));
  }
  #overlayImg{ display:block; width:100%; height:auto; }

  /* 選択枠（コーナーブラケット）— 編集中のみ表示 */
  #frame{
    position:absolute; inset:0;
    border:1px solid rgba(255,176,32,.55);
    pointer-events:none;
  }
  #frame::before, #frame::after,
  #frame > i::before, #frame > i::after{
    content:""; position:absolute; width:16px; height:16px;
    border:2px solid var(--accent);
  }
  #frame::before{ top:-2px; left:-2px; border-right:0; border-bottom:0; }
  #frame::after{ top:-2px; right:-2px; border-left:0; border-bottom:0; }
  #frame > i::before{ bottom:-2px; left:-2px; border-right:0; border-top:0; }
  #frame > i::after{ bottom:-2px; right:-2px; border-left:0; border-top:0; }
  #stage.locked #frame{ display:none; }
  #stage.empty #overlay{ display:none; }

  /* ---------- 上部コントロールバー ---------- */
  #topbar{
    position:absolute; left:0; right:0; top:0; z-index:20;
    padding:calc(env(safe-area-inset-top) + 8px) 10px 10px;
    background:linear-gradient(180deg, rgba(0,0,0,.35), rgba(0,0,0,0) 100%);
  }
  .panel{
    background:var(--chrome);
    -webkit-backdrop-filter:blur(18px) saturate(1.3);
    backdrop-filter:blur(18px) saturate(1.3);
    border:1px solid var(--stroke);
    border-radius:var(--radius);
    padding:8px;
    box-shadow:0 8px 30px rgba(0,0,0,.35);
  }

  /* 工具列 */
  .tools{ display:flex; align-items:center; gap:8px; }
  .spacer{ flex:1 1 auto; }

  button{ font-family:var(--sans); color:var(--text); cursor:pointer; }

  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    min-width:var(--tap); height:var(--tap);
    padding:0 12px;
    background:rgba(255,255,255,.05);
    border:1px solid var(--stroke);
    border-radius:12px;
    transition:background .15s, border-color .15s, transform .05s;
  }
  .btn:active{ transform:scale(.96); background:rgba(255,255,255,.10); }
  .btn:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }
  .btn svg{ width:22px; height:22px; display:block; stroke:currentColor; }
  .btn svg *{ stroke:currentColor; }
  .btn .lbl{ font-size:13px; font-weight:600; letter-spacing:.01em; }
  .btn.icon{ padding:0; width:var(--tap); }

  .btn.primary{
    background:var(--accent); color:#1A1206; border-color:transparent; font-weight:700;
  }
  .btn.primary:active{ background:var(--accent-press); }
  .btn.primary svg *{ stroke:#1A1206; }

  .btn[aria-pressed="true"]{
    background:rgba(255,176,32,.16);
    border-color:var(--accent);
    color:var(--accent);
  }
  .btn[aria-pressed="true"] svg *{ stroke:var(--accent); }
  .btn:disabled{ opacity:.4; pointer-events:none; }

  /* スライダー領域 */
  .sliders{
    margin-top:6px;
    display:grid; gap:0;
    overflow:hidden;
    transition:max-height .28s ease, opacity .2s ease, margin-top .28s ease;
    max-height:180px; opacity:1;
  }
  #topbar.collapsed .sliders{ max-height:0; opacity:0; margin-top:0; }

  .row{
    display:grid;
    grid-template-columns:56px 1fr 54px;
    align-items:center;
    gap:10px;
    padding:0 6px;
  }
  .row .name{
    font-size:10px; font-weight:700; letter-spacing:.10em; text-transform:uppercase;
    color:var(--muted);
  }
  .row .val{
    font-family:var(--mono); font-size:13px; text-align:right; color:var(--accent);
    font-variant-numeric:tabular-nums;
  }
  .row.disabled{ opacity:.35; }

  input[type=range]{
    -webkit-appearance:none; appearance:none;
    width:100%; height:34px; margin:0; background:transparent;
  }
  input[type=range]::-webkit-slider-runnable-track{
    height:4px; border-radius:99px;
    background:rgba(255,255,255,.16);
  }
  input[type=range]::-moz-range-track{
    height:4px; border-radius:99px; background:rgba(255,255,255,.16);
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none; appearance:none;
    width:22px; height:22px; margin-top:-9px;
    border-radius:50%; background:var(--accent);
    border:3px solid rgba(20,22,26,.9);
    box-shadow:0 2px 8px rgba(0,0,0,.5);
  }
  input[type=range]::-moz-range-thumb{
    width:22px; height:22px;
    border-radius:50%; background:var(--accent);
    border:3px solid rgba(20,22,26,.9);
    box-shadow:0 2px 8px rgba(0,0,0,.5);
  }
  input[type=range]:focus-visible::-webkit-slider-thumb{ outline:2px solid #fff; }

  /* ---------- 空状態のヒント ---------- */
  #hint{
    position:absolute; left:50%; top:52%; transform:translate(-50%,-50%);
    z-index:10; text-align:center; pointer-events:none; padding:0 24px;
    transition:opacity .3s;
  }
  #stage:not(.empty) #hint{ opacity:0; }
  #hint .ring{
    width:70px; height:70px; margin:0 auto 14px;
    border:2px dashed rgba(255,255,255,.4); border-radius:16px;
    display:grid; place-items:center;
  }
  #hint .ring svg{ width:30px; height:30px; opacity:.85; }
  #hint h1{ font-size:16px; font-weight:700; margin:0 0 6px; }
  #hint p{ font-size:13px; color:var(--muted); margin:0; line-height:1.6; }

  /* ---------- ロック中の解除ピル ---------- */
  #unlockPill{
    position:absolute; left:50%; bottom:calc(env(safe-area-inset-bottom) + 18px);
    transform:translateX(-50%); z-index:15;
    display:none; align-items:center; gap:8px;
    height:42px; padding:0 16px 0 14px;
    background:var(--chrome); border:1px solid var(--stroke-strong);
    -webkit-backdrop-filter:blur(14px); backdrop-filter:blur(14px);
    border-radius:99px; color:var(--text); font-size:13px; font-weight:600;
    box-shadow:0 8px 24px rgba(0,0,0,.4);
  }
  #stage.locked #unlockPill{ display:inline-flex; }
  #unlockPill svg{ width:18px; height:18px; }
  #unlockPill svg *{ stroke:var(--ok); }

  /* ---------- 下部 方向パッド（位置微調整） ---------- */
  #dpad{
    position:absolute; z-index:16;
    right:calc(env(safe-area-inset-right) + 14px);
    bottom:calc(env(safe-area-inset-bottom) + 18px);
    display:grid;
    grid-template-columns:repeat(3, 44px);
    grid-template-rows:repeat(3, 44px);
    gap:6px;
    padding:8px;
    background:var(--chrome);
    -webkit-backdrop-filter:blur(14px); backdrop-filter:blur(14px);
    border:1px solid var(--stroke); border-radius:18px;
    box-shadow:0 8px 24px rgba(0,0,0,.4);
  }
  #stage.empty #dpad, #stage.locked #dpad{ display:none; }
  .nudge{
    display:inline-flex; align-items:center; justify-content:center;
    background:rgba(255,255,255,.05);
    border:1px solid var(--stroke);
    border-radius:12px;
    color:var(--text);
    touch-action:none;
  }
  .nudge:active{ background:rgba(255,176,32,.18); border-color:var(--accent); color:var(--accent); }
  .nudge svg{ width:22px; height:22px; stroke:currentColor; }
  .nudge svg *{ stroke:currentColor; }
  .nudge[data-dir="up"]{    grid-area:1 / 2 / 2 / 3; }
  .nudge[data-dir="left"]{  grid-area:2 / 1 / 3 / 2; }
  .nudge[data-dir="right"]{ grid-area:2 / 3 / 3 / 4; }
  .nudge[data-dir="down"]{  grid-area:3 / 2 / 4 / 3; }
  #dpad .hub{
    grid-area:2 / 2 / 3 / 3;
    display:grid; place-items:center;
    font-size:9px; font-weight:700; letter-spacing:.08em;
    color:var(--muted); text-transform:uppercase;
  }

  /* ---------- カメラエラー ---------- */
  #camError{
    position:absolute; inset:0; z-index:30; display:none;
    place-items:center; text-align:center; padding:28px;
    background:rgba(6,7,9,.92);
  }
  #camError.show{ display:grid; }
  #camError .box{ max-width:340px; }
  #camError h2{ font-size:17px; margin:0 0 10px; }
  #camError p{ color:var(--muted); font-size:13px; line-height:1.7; margin:0 0 18px; }
  #camError .btn{ margin:0 auto; }

  @media (prefers-reduced-motion: reduce){
    *{ transition:none !important; }
  }
</style>
</head>
<body>
<div id="stage" class="empty">
  <video id="cam" playsinline autoplay muted></video>

  <div id="gesture"></div>

  <div id="overlay">
    <img id="overlayImg" alt="" draggable="false" />
    <div id="frame"><i></i></div>
  </div>

  <!-- 空状態ヒント -->
  <div id="hint">
    <div class="ring">
      <svg viewBox="0 0 24 24" fill="none"><path d="M12 16V4m0 0L8 8m4-4 4 4" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M4 16v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/></svg>
    </div>
    <h1>下絵を重ねてなぞる</h1>
    <p>「画像」から下絵を選ぶと、カメラ映像の上に薄く重なります。<br>指でドラッグ＝移動 / 2本指＝拡大・回転</p>
  </div>

  <!-- ロック解除ピル -->
  <button id="unlockPill">
    <svg viewBox="0 0 24 24" fill="none"><rect x="5" y="11" width="14" height="9" rx="2" stroke-width="1.8"/><path d="M8 11V8a4 4 0 0 1 7.5-2" stroke-width="1.8" stroke-linecap="round"/></svg>
    ロック中 — タップで編集に戻る
  </button>

  <!-- 下部 方向パッド（位置微調整） -->
  <div id="dpad" role="group" aria-label="位置を微調整">
    <button class="nudge" data-dir="up" aria-label="上へ移動">
      <svg viewBox="0 0 24 24" fill="none"><path d="M12 19V5m0 0l-6 6m6-6l6 6" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <button class="nudge" data-dir="left" aria-label="左へ移動">
      <svg viewBox="0 0 24 24" fill="none"><path d="M19 12H5m0 0l6-6m-6 6l6 6" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <div class="hub">微調整</div>
    <button class="nudge" data-dir="right" aria-label="右へ移動">
      <svg viewBox="0 0 24 24" fill="none"><path d="M5 12h14m0 0l-6-6m6 6l-6 6" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <button class="nudge" data-dir="down" aria-label="下へ移動">
      <svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14m0 0l-6-6m6 6l6-6" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>

  <!-- 上部コントロール -->
  <div id="topbar">
    <div class="panel">
      <div class="tools">
        <button class="btn primary" id="uploadBtn" aria-label="画像をアップロード">
          <svg viewBox="0 0 24 24" fill="none"><path d="M12 15V4m0 0L8 8m4-4 4 4" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M4 15v3a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-3" stroke-width="1.8" stroke-linecap="round"/></svg>
          <span class="lbl">画像</span>
        </button>

        <div class="spacer"></div>

        <button class="btn icon" id="flipBtn" aria-label="左右反転" disabled>
          <svg viewBox="0 0 24 24" fill="none"><path d="M12 3v18" stroke-width="1.8" stroke-linecap="round" stroke-dasharray="2 3"/><path d="M9 7 4 12l5 5V7Z" stroke-width="1.8" stroke-linejoin="round"/><path d="M15 7l5 5-5 5V7Z" stroke-width="1.8" stroke-linejoin="round"/></svg>
        </button>

        <button class="btn icon" id="lockBtn" aria-label="位置をロック" aria-pressed="false" disabled>
          <svg viewBox="0 0 24 24" fill="none"><rect x="5" y="11" width="14" height="9" rx="2" stroke-width="1.8"/><path d="M8 11V8a4 4 0 0 1 8 0v3" stroke-width="1.8" stroke-linecap="round"/></svg>
        </button>

        <button class="btn icon" id="resetBtn" aria-label="配置をリセット" disabled>
          <svg viewBox="0 0 24 24" fill="none"><path d="M4 12a8 8 0 1 1 2.3 5.6" stroke-width="1.8" stroke-linecap="round"/><path d="M4 20v-4h4" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>

        <button class="btn icon" id="camBtn" aria-label="カメラ切替">
          <svg viewBox="0 0 24 24" fill="none"><path d="M4 8h3l1.5-2h7L17 8h3a1 1 0 0 1 1 1v9a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9a1 1 0 0 1 1-1Z" stroke-width="1.6"/><path d="M10 13a2 2 0 0 1 4 0m0 0h-2m2 0v-2M14 13a2 2 0 0 1-4 0m0 0h2m-2 0v2" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>

        <button class="btn icon" id="collapseBtn" aria-label="スライダーを隠す" aria-pressed="false">
          <svg id="chev" viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>

      <div class="sliders">
        <div class="row disabled" id="rowOpacity">
          <span class="name">透明度</span>
          <input type="range" id="opacity" min="0" max="100" step="1" value="50" aria-label="透明度" />
          <span class="val" id="opacityVal">50%</span>
        </div>
        <div class="row disabled" id="rowScale">
          <span class="name">サイズ</span>
          <input type="range" id="scale" min="10" max="400" step="1" value="100" aria-label="サイズ" />
          <span class="val" id="scaleVal">100%</span>
        </div>
        <div class="row disabled" id="rowRot">
          <span class="name">回転</span>
          <input type="range" id="rot" min="-180" max="180" step="1" value="0" aria-label="回転" />
          <span class="val" id="rotVal">0°</span>
        </div>
      </div>
    </div>
  </div>

  <!-- カメラエラー -->
  <div id="camError">
    <div class="box">
      <h2>カメラを起動できません</h2>
      <p id="camErrorMsg">カメラへのアクセスが許可されていない可能性があります。ブラウザの権限を確認してから、もう一度お試しください。<br><br>※ カメラは <b>https</b> または端末で開いた場合のみ利用できます。</p>
      <button class="btn primary" id="retryBtn"><span class="lbl">もう一度試す</span></button>
    </div>
  </div>

  <input type="file" id="file" accept="image/*" hidden />
</div>

<script>
(() => {
  "use strict";

  const stage    = document.getElementById('stage');
  const cam      = document.getElementById('cam');
  const gesture  = document.getElementById('gesture');
  const overlay  = document.getElementById('overlay');
  const overlayImg = document.getElementById('overlayImg');
  const fileInput = document.getElementById('file');

  const uploadBtn = document.getElementById('uploadBtn');
  const flipBtn   = document.getElementById('flipBtn');
  const lockBtn   = document.getElementById('lockBtn');
  const resetBtn  = document.getElementById('resetBtn');
  const camBtn    = document.getElementById('camBtn');
  const collapseBtn = document.getElementById('collapseBtn');
  const topbar    = document.getElementById('topbar');
  const unlockPill = document.getElementById('unlockPill');

  const opacityEl = document.getElementById('opacity');
  const scaleEl   = document.getElementById('scale');
  const rotEl     = document.getElementById('rot');
  const opacityVal = document.getElementById('opacityVal');
  const scaleVal  = document.getElementById('scaleVal');
  const rotVal    = document.getElementById('rotVal');
  const rows = {
    opacity: document.getElementById('rowOpacity'),
    scale:   document.getElementById('rowScale'),
    rot:     document.getElementById('rowRot'),
  };

  const camError = document.getElementById('camError');
  const camErrorMsg = document.getElementById('camErrorMsg');
  const retryBtn  = document.getElementById('retryBtn');

  // ---- 変形の状態 ----
  const state = {
    x: 0, y: 0,        // 中心からのオフセット(px)
    scale: 1,          // 1 = 読み込み時のフィットサイズ
    rot: 0,            // 度
    opacity: 0.5,
    flip: 1,           // 1 or -1
    locked: false,
    hasImage: false,
  };
  const SCALE_MIN = 0.05, SCALE_MAX = 8;

  // =========================================================
  //  カメラ
  // =========================================================
  let currentStream = null;
  let facing = 'environment';

  async function startCamera(){
    stopCamera();
    try{
      currentStream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: facing } },
        audio: false
      });
      cam.srcObject = currentStream;
      await cam.play().catch(()=>{});
      camError.classList.remove('show');
    }catch(err){
      showCamError(err);
    }
  }
  function stopCamera(){
    if(currentStream){ currentStream.getTracks().forEach(t=>t.stop()); currentStream=null; }
  }
  function showCamError(err){
    let msg = 'カメラへのアクセスが許可されていない可能性があります。ブラウザの権限を確認してから、もう一度お試しください。';
    if(err){
      if(err.name === 'NotAllowedError') msg = 'カメラの使用が拒否されました。ブラウザ／端末の設定でこのページにカメラを許可してください。';
      else if(err.name === 'NotFoundError') msg = '利用できるカメラが見つかりませんでした。';
      else if(err.name === 'NotReadableError') msg = '他のアプリがカメラを使用中の可能性があります。他のアプリを閉じてお試しください。';
    }
    camErrorMsg.innerHTML = msg + '<br><br>※ カメラは <b>https</b> のページ、または端末上で開いた場合のみ利用できます。';
    camError.classList.add('show');
  }
  retryBtn.addEventListener('click', startCamera);

  camBtn.addEventListener('click', () => {
    facing = (facing === 'environment') ? 'user' : 'environment';
    startCamera();
  });

  // =========================================================
  //  画像アップロード
  // =========================================================
  uploadBtn.addEventListener('click', () => fileInput.click());

  fileInput.addEventListener('change', () => {
    const f = fileInput.files && fileInput.files[0];
    if(!f) return;
    const url = URL.createObjectURL(f);
    const probe = new Image();
    probe.onload = () => {
      overlayImg.src = url;
      fitImage(probe.naturalWidth, probe.naturalHeight);
      state.hasImage = true;
      stage.classList.remove('empty');
      enableControls(true);
      // 位置・回転・反転はリセット、透明度は現状維持
      state.x = 0; state.y = 0; state.rot = 0; state.flip = 1;
      state.scale = 1;
      apply(); syncSliders();
    };
    probe.onerror = () => { URL.revokeObjectURL(url); };
    probe.src = url;
    fileInput.value = '';
  });

  // 読み込み時のフィット幅を決める（画面の短辺の 70% に収める）
  function fitImage(nw, nh){
    const vw = window.innerWidth, vh = window.innerHeight;
    const target = Math.min(vw, vh) * 0.7;
    const ratio = nw / nh;
    let w;
    if(ratio >= 1) w = Math.min(target, vw * 0.9);
    else           w = Math.min(target * ratio, vw * 0.9);
    overlayImg.style.width = w + 'px';
  }

  // =========================================================
  //  変形の適用
  // =========================================================
  function apply(){
    overlay.style.opacity = state.opacity;
    overlay.style.transform =
      `translate(-50%, -50%) translate(${state.x}px, ${state.y}px) ` +
      `rotate(${state.rot}deg) scale(${state.scale * state.flip}, ${state.scale})`;

    opacityVal.textContent = Math.round(state.opacity * 100) + '%';
    scaleVal.textContent   = Math.round(state.scale * 100) + '%';
    rotVal.textContent     = Math.round(normDeg(state.rot)) + '°';
  }

  function normDeg(d){ return ((d % 360) + 540) % 360 - 180; } // -180..180

  // スライダー表示を state に同期（ジェスチャー後に呼ぶ）
  function syncSliders(){
    opacityEl.value = Math.round(state.opacity * 100);
    scaleEl.value   = clamp(Math.round(state.scale * 100), +scaleEl.min, +scaleEl.max);
    rotEl.value     = Math.round(normDeg(state.rot));
  }

  function clamp(v, a, b){ return Math.max(a, Math.min(b, v)); }

  // =========================================================
  //  スライダー入力
  // =========================================================
  opacityEl.addEventListener('input', () => { state.opacity = +opacityEl.value / 100; apply(); });
  scaleEl.addEventListener('input',   () => { state.scale = clamp(+scaleEl.value/100, SCALE_MIN, SCALE_MAX); apply(); });
  rotEl.addEventListener('input',     () => { state.rot = +rotEl.value; apply(); });

  function enableControls(on){
    [flipBtn, lockBtn, resetBtn].forEach(b => b.disabled = !on);
    [opacityEl, scaleEl, rotEl].forEach(el => el.disabled = !on);
    for(const k in rows) rows[k].classList.toggle('disabled', !on);
  }

  // =========================================================
  //  ボタン
  // =========================================================
  flipBtn.addEventListener('click', () => { state.flip *= -1; apply(); });

  resetBtn.addEventListener('click', () => {
    state.x = 0; state.y = 0; state.scale = 1; state.rot = 0; state.flip = 1;
    apply(); syncSliders();
  });

  function setLocked(v){
    state.locked = v;
    stage.classList.toggle('locked', v);
    lockBtn.setAttribute('aria-pressed', String(v));
    lockBtn.setAttribute('aria-label', v ? 'ロックを解除' : '位置をロック');
    // アイコン切替（施錠/解錠）
    lockBtn.querySelector('svg').innerHTML = v
      ? '<rect x="5" y="11" width="14" height="9" rx="2" stroke-width="1.8"/><path d="M8 11V8a4 4 0 0 1 8 0" stroke-width="1.8" stroke-linecap="round"/>'
      : '<rect x="5" y="11" width="14" height="9" rx="2" stroke-width="1.8"/><path d="M8 11V8a4 4 0 0 1 8 0v3" stroke-width="1.8" stroke-linecap="round"/>';
  }
  lockBtn.addEventListener('click', () => setLocked(!state.locked));
  unlockPill.addEventListener('click', () => setLocked(false));

  collapseBtn.addEventListener('click', () => {
    const c = topbar.classList.toggle('collapsed');
    collapseBtn.setAttribute('aria-pressed', String(c));
    collapseBtn.setAttribute('aria-label', c ? 'スライダーを表示' : 'スライダーを隠す');
    document.getElementById('chev').style.transform = c ? 'rotate(180deg)' : 'none';
  });

  // =========================================================
  //  下部 方向パッド（位置微調整）— タップ＝1px、長押し＝連続移動
  // =========================================================
  const DIRS = { up:[0,-1], down:[0,1], left:[-1,0], right:[1,0] };
  let nudgeTimer = null, nudgeRAF = null;

  function nudgeStep(dir, dist){
    const d = DIRS[dir]; if(!d) return;
    state.x += d[0] * dist;
    state.y += d[1] * dist;
    apply();
  }

  function stopNudge(){
    if(nudgeTimer){ clearTimeout(nudgeTimer); nudgeTimer = null; }
    if(nudgeRAF){ cancelAnimationFrame(nudgeRAF); nudgeRAF = null; }
  }

  document.querySelectorAll('.nudge').forEach(btn => {
    const dir = btn.dataset.dir;
    btn.addEventListener('pointerdown', (e) => {
      if(state.locked || !state.hasImage) return;
      e.preventDefault();
      btn.setPointerCapture(e.pointerId);
      stopNudge();
      nudgeStep(dir, 1);                 // 最初の1タップ
      // 長押しで加速しながら連続移動
      let speed = 1;                     // px / frame
      nudgeTimer = setTimeout(function loop(){
        const frame = () => {
          nudgeStep(dir, speed);
          speed = Math.min(speed + 0.15, 6);
          nudgeRAF = requestAnimationFrame(frame);
        };
        frame();
      }, 320);
    });
    ['pointerup','pointercancel','pointerleave','lostpointercapture'].forEach(ev =>
      btn.addEventListener(ev, () => stopNudge())
    );
  });

  // =========================================================
  //  ジェスチャー（ドラッグ / ピンチ拡大・回転）
  // =========================================================
  const pointers = new Map();
  let prev = null; // { cx, cy, dist, ang }

  function centroid(){
    let x=0, y=0, n=0;
    for(const p of pointers.values()){ x+=p.x; y+=p.y; n++; }
    return { x:x/n, y:y/n, n };
  }
  function twoFingerMetrics(){
    const it = [...pointers.values()];
    const dx = it[1].x - it[0].x, dy = it[1].y - it[0].y;
    return { dist: Math.hypot(dx, dy), ang: Math.atan2(dy, dx) };
  }

  gesture.addEventListener('pointerdown', (e) => {
    if(state.locked || !state.hasImage) return;
    gesture.setPointerCapture(e.pointerId);
    pointers.set(e.pointerId, { x:e.clientX, y:e.clientY });
    resetGestureBase();
  });

  gesture.addEventListener('pointermove', (e) => {
    if(!pointers.has(e.pointerId)) return;
    pointers.set(e.pointerId, { x:e.clientX, y:e.clientY });

    const c = centroid();

    if(pointers.size === 1){
      // 1本指 = 平行移動
      if(prev){ state.x += c.x - prev.cx; state.y += c.y - prev.cy; }
      prev = { cx:c.x, cy:c.y, dist:0, ang:0 };
    } else if(pointers.size >= 2){
      const m = twoFingerMetrics();
      if(prev && prev.dist > 0){
        // 重心の移動 = 平行移動
        state.x += c.x - prev.cx;
        state.y += c.y - prev.cy;

        const f  = m.dist / prev.dist;                 // 拡大率
        const dth = m.ang - prev.ang;                  // 回転(rad)

        // 焦点(重心)を中心に scale / rotate してタッチ位置を保つ
        const cx = window.innerWidth/2 + state.x;
        const cy = window.innerHeight/2 + state.y;
        let vx = cx - c.x, vy = cy - c.y;
        const cos = Math.cos(dth), sin = Math.sin(dth);
        const rx = vx*cos - vy*sin, ry = vx*sin + vy*cos;
        const nx = c.x + rx*f, ny = c.y + ry*f;
        state.x = nx - window.innerWidth/2;
        state.y = ny - window.innerHeight/2;

        state.scale = clamp(state.scale * f, SCALE_MIN, SCALE_MAX);
        state.rot += dth * 180/Math.PI;
      }
      prev = { cx:c.x, cy:c.y, dist:m.dist, ang:m.ang };
    }
    apply();
  });

  function endPointer(e){
    if(!pointers.has(e.pointerId)) return;
    pointers.delete(e.pointerId);
    resetGestureBase();
    if(pointers.size === 0){ syncSliders(); }
  }
  function resetGestureBase(){
    if(pointers.size === 0){ prev = null; return; }
    const c = centroid();
    if(pointers.size >= 2){
      const m = twoFingerMetrics();
      prev = { cx:c.x, cy:c.y, dist:m.dist, ang:m.ang };
    } else {
      prev = { cx:c.x, cy:c.y, dist:0, ang:0 };
    }
  }
  gesture.addEventListener('pointerup', endPointer);
  gesture.addEventListener('pointercancel', endPointer);
  gesture.addEventListener('lostpointercapture', endPointer);

  // 画面回転時にフィット位置がずれても中心基準なので概ね維持
  window.addEventListener('resize', () => { apply(); }, { passive:true });

  // ダブルタップズーム等の抑止
  document.addEventListener('gesturestart', e => e.preventDefault());
  document.addEventListener('dblclick', e => e.preventDefault());

  // =========================================================
  //  起動
  // =========================================================
  apply();
  startCamera();
  window.addEventListener('pagehide', stopCamera);
})();
</script>
</body>
</html>
